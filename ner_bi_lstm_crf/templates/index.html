<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>医疗实体抽取</title>
  </head>
  <body>
    <h1>医疗实体抽取</h1>
    <form method="post">
      <label for="text">输入文本：</label>
      <input type="text" name="text" id="text" required>
      <button type="submit">提交</button>
    </form>
    {% if result %}
      <h2>原始文本</h2>
      <p>{{ question }}</p>
      <h2>抽取结果</h2>
      <p>{{ result }}</p>
    {% endif %}
  </body>
</html>
